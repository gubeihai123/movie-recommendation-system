<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Recsys</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v=20260619e">
</head>
<body>
  <header class="topbar">
    <button class="brand-button" type="button" data-view="home" aria-label="Movie Recsys 首页">Movie Recsys</button>
    <div class="top-actions">
      <span class="user-chip" id="userChip" hidden>游客</span>
      <button class="glass-btn" id="openLoginBtn" type="button">登录</button>
      <button class="glass-btn" id="openRegisterBtn" type="button">注册</button>
      <button class="glass-btn" id="homeNavBtn" type="button" data-view="home" hidden>首页</button>
      <button class="glass-btn" id="logoutBtn" type="button" hidden>退出</button>
      <button class="glass-btn accent" id="heroRecommendBtn" type="button" hidden>智能推荐</button>
    </div>
  </header>

  <main class="app-shell">
    <section class="view active" id="view-home" data-view-panel="home">
      <section class="gallery-home" aria-label="电影封面画廊">
        <h1 class="split-title" aria-label="Movie Recsys">
          <span>Movie</span>
          <span>Recsys</span>
        </h1>
        <div class="gallery-stage" id="galleryStage">
          <div class="movie-sphere" id="movieSphere" aria-label="电影封面球"></div>
          <article class="focus-movie-card" id="focusMovieCard" hidden>
            <div class="focus-poster" id="focusPoster"></div>
            <div class="focus-copy">
              <span id="focusCategory">电影</span>
              <h2 id="focusTitle">选择一部电影</h2>
              <p id="focusRating">评分 0.0</p>
              <button class="glass-btn accent" id="focusBrowseBtn" type="button" data-action="detail" data-id="">浏览</button>
            </div>
            <button class="glass-btn accent focus-back-btn" id="closeFocusBtn" type="button">返回</button>
          </article>
        </div>
      </section>
    </section>

    <section class="view" id="view-recommend" data-view-panel="recommend">
      <section class="recommend-page">
        <div class="recommend-loading" id="recommendLoading">
          <h1>正在智能推荐ing</h1>
          <div class="rec-progress" aria-label="推荐加载进度">
            <span id="recommendProgressBar"></span>
          </div>
          <p id="recommendProgressText">1%</p>
          <b>loading</b>
        </div>
        <section class="recommend-showcase" id="recommendShowcase" hidden>
          <h1>Top 5 For You</h1>
          <div class="recommend-rail" id="recommendGrid"></div>
        </section>
      </section>
    </section>

    <section class="view" id="view-detail" data-view-panel="detail">
      <section class="detail-page" id="detailHero">
        <button class="glass-btn detail-back" id="backToMoviesBtn" type="button">返回</button>
        <div class="detail-layout">
          <div class="detail-poster" id="detailPoster"></div>
          <div class="detail-copy">
            <span class="eyebrow" id="detailCategory">电影</span>
            <h1 id="detailTitle">电影详情</h1>
            <div class="detail-stats" aria-label="电影评分数据">
              <article>
                <span>评分</span>
                <strong id="detailRating">0.0</strong>
              </article>
              <article>
                <span>评分人数</span>
                <strong id="detailRatingCount">0</strong>
              </article>
              <article>
                <span>浏览量</span>
                <strong id="detailViews">0</strong>
              </article>
            </div>
            <p id="detailDescription"></p>
            <div class="detail-actions">
              <button class="glass-btn accent" id="detailRateBtn" data-action="rate" data-id="" type="button">评分</button>
              <button class="glass-btn" id="detailFavoriteBtn" data-action="favorite" data-id="" type="button">收藏</button>
              <span id="detailUserScore" class="detail-note">未评分</span>
            </div>
          </div>
        </div>
      </section>
    </section>

    <section class="view utility-view" id="view-movies" data-view-panel="movies">
      <form class="search-bar" id="searchForm">
        <select id="categorySelect" aria-label="分类筛选">
          <option value="">全部分类</option>
        </select>
        <input id="searchInput" type="search" placeholder="搜索电影名称">
        <button class="glass-btn accent small" type="submit">搜索</button>
      </form>
      <div class="movie-grid catalog-grid" id="movieGrid"></div>
      <button class="glass-btn" id="loadMoreMoviesBtn" type="button" hidden>加载更多</button>
    </section>

    <section class="view utility-view" id="view-behavior" data-view-panel="behavior">
      <button class="glass-btn" id="behaviorLoginBtn" type="button">登录查看</button>
      <h2 id="profileName">未登录</h2>
      <p id="profileText">登录后查看个人行为画像。</p>
      <h2 id="behaviorProfileName">游客</h2>
      <p id="behaviorProfileText">登录后展示你的评分、收藏和浏览记录。</p>
      <div id="ratingList"></div>
      <div id="favoriteList"></div>
      <div id="browseList"></div>
      <meter min="0" max="100" value="0" id="ratingMeter"></meter><span id="ratingWeight">0%</span>
      <meter min="0" max="100" value="0" id="favoriteMeter"></meter><span id="favoriteWeight">0%</span>
      <meter min="0" max="100" value="0" id="browseMeter"></meter><span id="browseWeight">0%</span>
      <span id="behaviorCount">--</span>
    </section>

    <section class="view utility-view" id="view-admin" data-view-panel="admin">
      <h1>管理后台</h1>
      <div class="admin-grid" id="adminStats"></div>
    </section>
  </main>

  <div class="modal" id="loginModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
      <button class="close-btn" id="closeLoginBtn" type="button" aria-label="关闭">×</button>
      <h2 id="loginTitle">账号登录</h2>
      <form id="loginForm">
        <label>
          <span>用户名</span>
          <input name="username" minlength="3" maxlength="50" autocomplete="username" placeholder="请输入用户名" required>
        </label>
        <label id="emailField" hidden>
          <span>邮箱</span>
          <input name="email" type="email" maxlength="100" autocomplete="email" placeholder="例如 name@example.com">
        </label>
        <label>
          <span>密码</span>
          <input name="password" type="password" minlength="6" autocomplete="current-password" placeholder="请输入密码" required>
        </label>
        <div class="form-rules" id="registerRules" hidden>
          <span>注册要求</span>
          <p>用户名至少 3 位；密码至少 6 位；邮箱需包含 @，且用户名和邮箱不能与已有账号重复。</p>
        </div>
        <button class="glass-btn accent full" id="authSubmitBtn" type="submit">登录</button>
      </form>
      <button class="link-btn modal-switch" id="toggleAuthModeBtn" type="button">还没有账号？立即注册</button>
      <p class="form-note" id="loginMessage"></p>
    </div>
  </div>

  <div class="modal" id="ratingModal" aria-hidden="true">
    <div class="modal-card rating-modal-card" role="dialog" aria-modal="true" aria-labelledby="ratingTitle">
      <button class="close-btn" id="closeRatingBtn" type="button" aria-label="关闭">×</button>
      <span class="eyebrow">Rate Movie</span>
      <h2 id="ratingTitle">选择评分</h2>
      <div class="rating-stars" id="ratingStars" aria-label="电影评分">
        <button class="rating-star" type="button" data-score="1" aria-label="1 星">★</button>
        <button class="rating-star" type="button" data-score="2" aria-label="2 星">★</button>
        <button class="rating-star" type="button" data-score="3" aria-label="3 星">★</button>
        <button class="rating-star" type="button" data-score="4" aria-label="4 星">★</button>
        <button class="rating-star" type="button" data-score="5" aria-label="5 星">★</button>
      </div>
      <p class="rating-note" id="ratingNote">移动到星星上预览分数，点击确认评分。</p>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script src="{{ url_for('static', filename='js/app.js') }}?v=20260619e"></script>
</body>
</html>
